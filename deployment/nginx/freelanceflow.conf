# FreelanceFlow Nginx Configuration
# Production-ready setup with security headers, caching, and WebSocket support

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cache for static files
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=1g inactive=60m use_temp_path=off;

# Upstream servers
# For AWS EC2: Replace 'web' and 'daphne' with actual EC2 private IPs or load balancer DNS
upstream django_backend {
    least_conn;  # Load balancing method
    server web:8000 max_fails=3 fail_timeout=30s;
    # AWS EC2 Multi-instance setup (uncomment and configure):
    # server 10.0.1.10:8000 max_fails=3 fail_timeout=30s weight=1;
    # server 10.0.1.11:8000 max_fails=3 fail_timeout=30s weight=1;
    # Or use AWS Application Load Balancer:
    # server internal-freelanceflow-alb-123456789.us-east-1.elb.amazonaws.com:8000;
    keepalive 32;
}

upstream daphne_websocket {
    least_conn;
    server daphne:8001 max_fails=3 fail_timeout=30s;
    # AWS EC2 WebSocket servers (uncomment and configure):
    # server 10.0.1.10:8001 max_fails=3 fail_timeout=30s;
    # server 10.0.1.11:8001 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name freelanceflow.com www.freelanceflow.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name freelanceflow.com www.freelanceflow.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/freelanceflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freelanceflow.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/freelanceflow.com/chain.pem;

    # SSL Security Settings (Mozilla Intermediate Configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;

    # Logging
    access_log /var/log/nginx/freelanceflow_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/freelanceflow_error.log warn;

    # AWS CloudWatch Logs integration (optional)
    # Install nginx-module-njs for CloudWatch integration
    # access_log syslog:server=unix:/dev/log,facility=local7,tag=nginx,severity=info combined;

    # Grafana metrics endpoint (for nginx-prometheus-exporter)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;  # AWS VPC CIDR
        deny all;
    }

    # General settings
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # Timeouts
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 65s;
    send_timeout 10s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 256;

    # Brotli compression (if module available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Root directory
    root /var/www/freelanceflow;

    # Health check endpoint (no rate limiting)
    location /health/ {
        access_log off;
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Proxy timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Hide backend headers
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
    }

    # Authentication endpoints with stricter rate limiting
    location ~ ^/api/users/(login|register|password-reset)/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Django Admin (restrict access by IP if needed)
    location /admin/ {
        # Uncomment to restrict by IP:
        # allow 203.0.113.0/24;  # Your office IP
        # deny all;

        limit_req zone=general_limit burst=10 nodelay;

        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket connections (Django Channels)
    location /ws/ {
        proxy_pass http://daphne_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # Disable buffering for WebSocket
        proxy_buffering off;
    }

    # Static files (Django collectstatic)
    location /static/ {
        alias /var/www/freelanceflow/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Enable caching
        proxy_cache static_cache;
        proxy_cache_valid 200 1y;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;

        # Gzip static files
        gzip_static on;
    }

    # Media files (user uploads)
    location /media/ {
        alias /var/www/freelanceflow/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;

        # Security: Prevent execution of uploaded files
        location ~ \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
    }

    # Favicon
    location = /favicon.ico {
        alias /var/www/freelanceflow/staticfiles/favicon.ico;
        access_log off;
        log_not_found off;
        expires 1y;
    }

    # Robots.txt
    location = /robots.txt {
        alias /var/www/freelanceflow/staticfiles/robots.txt;
        access_log off;
        log_not_found off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Frontend (React app) - serve from root
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
}

# Redirect www to non-www (optional)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.freelanceflow.com;

    ssl_certificate /etc/letsencrypt/live/freelanceflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freelanceflow.com/privkey.pem;

    return 301 https://freelanceflow.com$request_uri;
}
